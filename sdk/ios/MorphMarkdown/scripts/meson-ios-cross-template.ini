[binaries]
c = '@CC@'
cpp = '@CXX@'
ar = '@AR@'
strip = '@STRIP@'
pkg-config = '@PKG_CONFIG@'

[built-in options]
c_args = ['-target', '@TARGET@', '-isysroot', '@SDKROOT@', '-miphoneos-version-min=@MIN_VERSION@']
cpp_args = ['-target', '@TARGET@', '-isysroot', '@SDKROOT@', '-miphoneos-version-min=@MIN_VERSION@']
c_link_args = ['-target', '@TARGET@', '-isysroot', '@SDKROOT@', '-miphoneos-version-min=@MIN_VERSION@']
cpp_link_args = ['-target', '@TARGET@', '-isysroot', '@SDKROOT@', '-miphoneos-version-min=@MIN_VERSION@']

[host_machine]
system = 'darwin'
cpu_family = '@CPU_FAMILY@'
cpu = '@CPU@'
endian = 'little'
